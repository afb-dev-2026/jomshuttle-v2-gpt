<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JomShuttle | Book Private Transport in Malaysia</title>
<meta name="description" content="Book airport transfer, interstate travel and tour packages across Malaysia via WhatsApp with JomShuttle.">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f6f8fb;
  color: #111;
}

/* ===== HERO ===== */
.hero {
  background: linear-gradient(135deg, #0071c2, #00a6ff);
  color: white;
  padding: 60px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.9;
}

/* ===== BOOKING FORM ===== */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.form-card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  margin-top: -40px;
}

/* GRID FORM */
.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
  .form-grid {
    grid-template-columns: 1fr;
  }

  .hero h1 {
    font-size: 24px;
  }
}

/* INPUT */
input, select {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  background: #febb02;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* SERVICES */
.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 30px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.card i {
  font-size: 28px;
  color: #0071c2;
  margin-bottom: 10px;
}

</style>

</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>JomShuttle Malaysia</h1>
  <p>Airport Transfer • Interstate Travel • Tour Packages</p>
</section>

<!-- BOOKING FORM -->
<div class="container">

  <div class="form-card">

    <h2>Book Your Trip</h2>

    <form id="bookingForm">

      <!-- HONEYPOT (ANTI BOT) -->
      <input type="text" name="company" style="display:none">

      <div class="form-grid">

        <input type="text" id="name" placeholder="Full Name" required>

        <input type="tel" id="phone" placeholder="Phone Number" required>

        <select id="service">
          <option>Airport Transfer</option>
          <option>Interstate Transfer</option>
          <option>Tour Package</option>
        </select>

        <input type="text" id="pickup" placeholder="Pickup Location">

        <input type="text" id="dropoff" placeholder="Dropoff Location">

        <input type="date" id="date">

        <input type="time" id="time">

      </div>

      <button type="submit">
        🚐 Book via WhatsApp
      </button>

    </form>

  </div>

  <!-- SERVICES -->
  <div class="services">

    <div class="card">
      <i class="fa-solid fa-plane"></i>
      <h3>Airport Transfer</h3>
      <p>KLIA, KLIA2 & all airports</p>
    </div>

    <div class="card">
      <i class="fa-solid fa-road"></i>
      <h3>Interstate Travel</h3>
      <p>Travel across Malaysia safely</p>
    </div>

    <div class="card">
      <i class="fa-solid fa-map"></i>
      <h3>Tour Packages</h3>
      <p>Hatyai, Terengganu & more</p>
    </div>

  </div>

</div>

<!-- SCRIPT -->
<script type="module">

import { sendWhatsApp } from "./js/whatsapp.js";
import { sendEmail } from "./js/email.js";

/* FORM HANDLER */
document.getElementById("bookingForm").addEventListener("submit", (e) => {
  e.preventDefault();

  // anti bot
  if (document.querySelector('[name="company"]').value !== "") {
    return;
  }

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    service: document.getElementById("service").value,
    pickup: document.getElementById("pickup").value,
    dropoff: document.getElementById("dropoff").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value
  };

  sendWhatsApp(data);
  sendEmail(data);
});

</script>

</body>
</html>
