<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JomShuttle</title>
<meta name="description" content="">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="hero">
  <div class="hero-content">
    <h1 id="title"></h1>
    <p id="desc"></p>
    <button onclick="bookNow()">Book Now</button>
  </div>
</section>

<section class="section">
  <h2>📍 Popular Routes</h2>
  <div id="routes" class="cards"></div>
</section>

<section class="section">
  <h2>💎 Why Choose Us</h2>
  <div id="highlights" class="cards"></div>
</section>

<script type="module">

import { STATES } from "./js/stateData.js";
import { sendWhatsApp } from "./js/whatsapp.js";
import { sendEmail } from "./js/email.js";

const slug = new URLSearchParams(window.location.search).get("state");
const data = STATES[slug];

document.getElementById("title").innerText = data.name + " Transport";
document.getElementById("desc").innerText = data.description;

document.title = "Airport Transfer " + data.name + " | JomShuttle";

const routesEl = document.getElementById("routes");
data.routes.forEach(r => {
  routesEl.innerHTML += `<div class="card">${r}</div>`;
});

const hlEl = document.getElementById("highlights");
data.highlights.forEach(h => {
  hlEl.innerHTML += `<div class="card">${h}</div>`;
});

function bookNow(){
  const booking = {
    name:"Customer",
    phone:"-",
    service:"Transfer",
    pickup:data.name,
    dropoff:"-"
  };
  sendWhatsApp(booking);
  sendEmail(booking);
}

window.bookNow = bookNow;

</script>

</body>
</html>
